name: Manual Backend deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'デプロイする環境'
        type: environment
        default: stg

permissions:
  id-token: write
  contents: read

concurrency: backend-deploy-(${{ github.ref_name }}) # pushブランチ名

jobs:
  file-changes:
    name: File Changes check
    runs-on: ubuntu-latest
    outputs:
      backend-stack: ${{ steps.filter.outputs.backend-stack }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            backend-stack:
              - .github/workflows/backend_deploy.yml
              - infra/cdk/lib/backend/**
              - infra/cdk/bin/**
              - backend/**

          base: ${{ github.ref_name }}

  backend-deploy:
    name: deploy backend
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment }}
    env:
      AWS_REGION: ap-northeast-1
      ACCOUNT_ID: ${{ vars.AWS_SUNABA_ACCOUNT_ID }}

    needs: file-changes
    steps:
      # リポジトリをチェックアウトし、ワークフローがリポジトリにアクセスできるようにする
      - name: Checkout
        uses: actions/checkout@v3

      # AWSリソースにアクセス
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1-node16
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_SUNABA_ACCOUNT_ID }}:role/github-oidc-role
          role-session-name: GitHubActions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      # Node.jsのバージョン指定
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 16.17

      - name: Install dependencies CDK
        run: |
          npm ci
        working-directory: infra/cdk

      - name: Deploy Oidc Stack
        if: ${{ needs.file-changes.outputs.backend-stack == 'true'}}
        run: |
          npx cdk deploy OidcStack --require-approval never
        working-directory: infra/cdk

      - name: Deploy WafAcm Stack
        if: ${{ needs.file-changes.outputs.backend-stack == 'true'}}
        run: |
          npx cdk deploy WafAcmStack --require-approval never
        working-directory: infra/cdk

      - name: Deploy Acm Stack
        if: ${{ needs.file-changes.outputs.backend-stack == 'true'}}
        run: |
          npx cdk deploy AcmStack --require-approval never
        working-directory: infra/cdk

      - name: Deploy Vpc Stack
        if: ${{ needs.file-changes.outputs.backend-stack == 'true'}}
        run: |
          npx cdk deploy VpcStack --require-approval never
        working-directory: infra/cdk

      - name: Deploy Ec2 Stack
        if: ${{ needs.file-changes.outputs.backend-stack == 'true'}}
        run: |
          npx cdk deploy Ec2Stack --require-approval never -c env=${{ needs.set-env.outputs.env }}
        working-directory: infra/cdk

      - name: Deploy Apigw Stack
        if: ${{ needs.file-changes.outputs.backend-stack == 'true'}}
        run: |
          npx cdk deploy TemplateApigwLambda --require-approval never
        working-directory: infra/cdk

  error:
    needs: [backend-deploy]
    if: failure()
    uses: daikin-tic/ADS-guideline/.github/workflows/error-deploy.yml@v1
    secrets: inherit
