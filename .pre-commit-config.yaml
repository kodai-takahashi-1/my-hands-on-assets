repos:
  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: python
        types: [file, python]
  - repo: local
    hooks:
      - id: flake8
        name: flake8
        entry: flake8
        language: python
        types: [file, python]
        args: [--config, .flake8]
