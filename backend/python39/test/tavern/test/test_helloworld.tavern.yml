test_name: api.sample.dup-ads.comのテスト

stages:
  - name: helloが取得できるどうかのテスト
    request:
      url: https://api.sample.dup-ads.com
      method: GET
    response:
      status_code: 200
      json: 'hello'

  - name: pyファイルでassert試す
    request:
      url: https://api.sample.dup-ads.com
      method: GET
    response:
      verify_response_with:
        function: helper.hello_world_test:response

